<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet"></head>
<body class="bg-[#050505] text-slate-300 antialiased selection:bg-red-500/30 selection:text-red-200 h-screen w-screen overflow-hidden flex flex-col relative" style="font-family: 'Inter', sans-serif; font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';">

    <!-- Original Aura Background -->
    <div class="fixed top-0 w-full h-screen -z-10" data-alpha-mask="80" style="mask-image: linear-gradient(to bottom, transparent, black 0%, black 80%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 0%, black 80%, transparent)">
        <div class="top-0 w-full -z-10 absolute h-full">
            <div data-us-project="FixNvEwvWwbu3QX9qC3F" class="absolute w-full h-full left-0 top-0 -z-10"></div>
            <script type="text/javascript">
                !function(){if(!window.UnicornStudio){window.UnicornStudio={isInitialized:!1};var i=document.createElement("script");i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v1.4.29/dist/unicornStudio.umd.js",i.onload=function(){window.UnicornStudio.isInitialized||(UnicornStudio.init(),window.UnicornStudio.isInitialized=!0)},(document.head || document.body).appendChild(i)}}();
            </script>
        </div>
    </div>

    <!-- Original Ambient Glow -->
    <div class="absolute top-[10%] left-1/2 -translate-x-1/2 w-[800px] h-[500px] bg-red-900/10 blur-[120px] rounded-full pointer-events-none opacity-40 mix-blend-screen -z-10"></div>

    <!-- Minimal Navigation -->
    <nav class="w-full p-6 flex items-center justify-between z-40 pointer-events-none absolute top-0">
        <div class="flex group cursor-pointer pointer-events-auto gap-x-3 gap-y-3 items-center">ALMA</div>
        <button class="pointer-events-auto flex items-center justify-center w-8 h-8 rounded-full bg-transparent hover:bg-white/[0.05] border border-transparent hover:border-white/10 transition-all text-slate-500 hover:text-white">
            <iconify-icon icon="solar:settings-linear" width="18" style="stroke-width: 1.5;"></iconify-icon>
        </button>
    </nav>

    <!-- Main Command Interface -->
    <main class="flex-1 flex flex-col items-center justify-center relative z-10 px-6 w-full max-w-3xl mx-auto">
       
        <!-- Greeting -->
        <div id="greeting" class="transition-all duration-1000 ease-out mb-8">
            <h1 class="md:text-5xl bg-clip-text text-4xl font-medium text-transparent tracking-tighter text-center bg-gradient-to-b from-white via-white to-white/50">HELLO SIR</h1>
        </div>

        <!-- Input Box -->
        <div id="input-container" class="transition-all duration-1000 delay-150 ease-out w-full relative group max-w-2xl mx-auto">
           
        </div>

        <!-- Suggested Actions Grid -->
        <div id="suggestions" class="transition-all duration-1000 delay-300 ease-out grid grid-cols-2 md:grid-cols-4 gap-3 mt-8 w-full max-w-2xl mx-auto">
           
           

           

           

           
           
        </div>
    </main>

    <!-- Footer Hint -->
    <div id="footer-hint" class="absolute bottom-8 w-full text-center pointer-events-none transition-opacity duration-1000 delay-500">
        <p class="text-xs text-slate-500 font-light flex items-center justify-center gap-1.5">
            Press <span class="px-1.5 py-0.5 rounded border border-white/10 bg-white/[0.03] text-[10px] font-medium text-slate-400 uppercase tracking-wide">Return</span> to execute command
        </p>
    </div>

    <!-- Initialization Script for Entrance Animations -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const elements = ['greeting', 'input-container', 'suggestions', 'footer-hint'];
                elements.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.classList.remove('opacity-0', 'translate-y-4');
                        el.classList.add('opacity-100', 'translate-y-0');
                    }
                });
            }, 100);
        });
    </script>

</body></html>
